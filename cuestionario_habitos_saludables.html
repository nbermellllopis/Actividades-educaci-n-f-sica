<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuestionario de hábitos saludables y alimentación</title>
  <meta name="theme-color" content="#15803d">
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #edf8f1, #fff5dc);
      color: #2f3e46;
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .contenedor {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      width: min(90vw, 760px);
      padding: 24px;
    }

    .menu-inicial {
      display: inline-block;
      margin-bottom: 16px;
      background-color: #dbeafe;
      color: #1d4ed8;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.05rem;
      padding: 10px 18px;
      border-radius: 8px;
      min-width: 140px;
      text-align: center;
    }

    .menu-inicial:hover {
      background-color: #bfdbfe;
      text-decoration: none;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #15803d;
    }

    .intro {
      text-align: center;
      font-size: 1.05rem;
      margin-bottom: 16px;
    }

    .imagen {
      display: block;
      margin: 0 auto 16px;
      max-width: 280px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .pregunta {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 14px;
      color: #000000;
    }

    .opciones {
      display: grid;
      gap: 10px;
    }

    .opcion {
      padding: 12px 14px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      background: #f8fafc;
      cursor: pointer;
      font-size: 1rem;
      text-align: left;
      color: #2563eb;
    }

    .opcion:hover {
      background: #e0f2fe;
      border-color: #60a5fa;
    }

    .opcion.correcta {
      background: #dcfce7;
      border-color: #22c55e;
    }

    .opcion.incorrecta {
      background: #fee2e2;
      border-color: #ef4444;
    }

    .feedback {
      margin-top: 14px;
      font-weight: bold;
      min-height: 24px;
    }

    .acciones {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      background: #15803d;
      color: white;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .resultado {
      display: none;
      text-align: center;
    }

    .resultado h2 {
      color: #15803d;
    }

    .resultado p {
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <main class="contenedor">
    <a class="menu-inicial" href="index.html">Menú inicial</a>
    <h1>Cuestionario: hábitos saludables y alimentación</h1>
    <p class="intro">Responde a estas 15 preguntas y demuestra cuánto sabes sobre hábitos saludables, alimentación y cuidado del cuerpo.</p>
    <img id="imagenPregunta" class="imagen" src="images/pan.png" alt="Imagen de referencia para la pregunta">

    <section id="quiz">
      <div id="pregunta" class="pregunta"></div>
      <div id="opciones" class="opciones"></div>
      <div id="feedback" class="feedback"></div>
      <div class="acciones">
        <button id="siguiente" type="button">Siguiente</button>
      </div>
    </section>

    <section id="resultado" class="resultado">
      <h2>¡Fin del cuestionario!</h2>
      <p id="mensajeResultado"></p>
      <button id="reiniciar" type="button">Volver a empezar</button>
    </section>
  </main>

  <script>
    const preguntas = [
      {
        pregunta: '¿Cuál de estas comidas sería la más adecuada para un desayuno equilibrado?',
        opciones: ['Un bollo industrial y un refresco.', 'Patatas fritas y un zumo azucarado.', 'Leche o yogur, fruta y pan integral con aceite de oliva.'],
        correcta: 2,
        imagen: 'images/pan.png',
        alt: 'Desayuno saludable'
      },
      {
        pregunta: '¿Cuánta agua es recomendable beber a lo largo del día, aproximadamente?',
        opciones: ['Entre 1,5 y 2 litros, dependiendo de la edad y la actividad física.', 'Solo un vaso al día.', 'Más de 5 litros todos los días.'],
        correcta: 0,
        imagen: 'images/agua.png',
        alt: 'Agua para hidratarse'
      },
      {
        pregunta: '¿Qué alimento es una buena fuente de proteínas?',
        opciones: ['Refresco.', 'Mantequilla.', 'Pollo.'],
        correcta: 2,
        imagen: 'images/pollo.png',
        alt: 'Pollo como fuente de proteínas'
      },
      {
        pregunta: '¿Por qué es importante dormir las horas necesarias?',
        opciones: ['Porque ayuda al crecimiento, al aprendizaje y a recuperar energía.', 'Porque fortalece únicamente los huesos.', 'Porque evita tener que hacer ejercicio.'],
        correcta: 0,
        imagen: 'images/nino.jpg',
        alt: 'Descanso y sueño'
      },
      {
        pregunta: '¿Qué hábito ayuda a mantener una buena salud cardiovascular?',
        opciones: ['Realizar actividad física de forma regular.', 'Permanecer sentado la mayor parte del día.', 'Comer únicamente alimentos ricos en azúcar.'],
        correcta: 0,
        imagen: 'images/celebrando.jpg',
        alt: 'Actividad física y movimiento'
      },
      {
        pregunta: '¿Cuál de estos alimentos pertenece al grupo de las frutas?',
        opciones: ['Tomate.', 'Patata.', 'Plátano.'],
        correcta: 2,
        imagen: 'images/platano.png',
        alt: 'Plátano'
      },
      {
        pregunta: '¿Qué beneficio aporta consumir verduras con frecuencia?',
        opciones: ['Aportan vitaminas, minerales y fibra.', 'Solo aportan agua.', 'Sustituyen completamente a las proteínas.'],
        correcta: 0,
        imagen: 'images/brocoli.png',
        alt: 'Verduras saludables'
      },
      {
        pregunta: '¿Cuál es la mejor bebida para hidratarse durante el día?',
        opciones: ['Bebida energética.', 'Refresco con gas.', 'Agua.'],
        correcta: 2,
        imagen: 'images/agua.png',
        alt: 'Agua'
      },
      {
        pregunta: '¿Qué es una dieta equilibrada?',
        opciones: ['Comer únicamente frutas y verduras.', 'Consumir alimentos variados en cantidades adecuadas.', 'Comer solo alimentos ricos en proteínas.'],
        correcta: 1,
        imagen: 'images/arroz.png',
        alt: 'Alimentación variada'
      },
      {
        pregunta: '¿Qué debemos hacer antes de comer?',
        opciones: ['Lavarnos las manos.', 'Beber un refresco.', 'Cepillarnos los dientes.'],
        correcta: 0,
        imagen: 'images/zanahoria.png',
        alt: 'Lavado de manos y higiene'
      },
      {
        pregunta: '¿Qué alimento aporta principalmente hidratos de carbono?',
        opciones: ['Atún.', 'Huevo.', 'Arroz.'],
        correcta: 2,
        imagen: 'images/arroz.png',
        alt: 'Arroz como fuente de hidratos de carbono'
      },
      {
        pregunta: '¿Cuál de estos hábitos favorece una buena salud?',
        opciones: ['Pasar muchas horas delante de una pantalla sin descansar.', 'Hacer ejercicio con regularidad y descansar lo suficiente.', 'Saltarse el desayuno todos los días.'],
        correcta: 1,
        imagen: 'images/celebrando.jpg',
        alt: 'Ejercicio y descanso'
      },
      {
        pregunta: '¿Por qué es recomendable limitar el consumo de alimentos ultraprocesados?',
        opciones: ['Porque suelen contener grandes cantidades de azúcar, sal y grasas poco saludables.', 'Porque no contienen ninguna vitamina.', 'Porque siempre producen alergias.'],
        correcta: 0,
        imagen: 'images/helado.png',
        alt: 'Alimentos ultraprocesados'
      },
      {
        pregunta: '¿Qué debemos hacer después de realizar una actividad física intensa?',
        opciones: ['Evitar beber agua durante varias horas.', 'Comer únicamente dulces.', 'Hidratarse y permitir que el cuerpo se recupere.'],
        correcta: 2,
        imagen: 'images/agua.png',
        alt: 'Hidratación tras el ejercicio'
      },
      {
        pregunta: '¿Cuál de estas meriendas es la más saludable?',
        opciones: ['Bollería industrial y un refresco.', 'Patatas fritas y una bebida energética.', 'Fruta y un puñado de frutos secos (si no existe alergia).'],
        correcta: 2,
        imagen: 'images/frutos_secos.png',
        alt: 'Merienda saludable'
      }
    ];

    const preguntaEl = document.getElementById('pregunta');
    const opcionesEl = document.getElementById('opciones');
    const feedbackEl = document.getElementById('feedback');
    const siguienteBtn = document.getElementById('siguiente');
    const quizEl = document.getElementById('quiz');
    const resultadoEl = document.getElementById('resultado');
    const mensajeResultadoEl = document.getElementById('mensajeResultado');
    const reiniciarBtn = document.getElementById('reiniciar');
    const imagenPreguntaEl = document.getElementById('imagenPregunta');

    let indiceActual = 0;
    let aciertos = 0;
    let respuestaSeleccionada = false;

    function mostrarPregunta() {
      feedbackEl.textContent = '';
      respuestaSeleccionada = false;
      opcionesEl.innerHTML = '';
      const pregunta = preguntas[indiceActual];
      preguntaEl.textContent = `${indiceActual + 1}. ${pregunta.pregunta}`;

      pregunta.opciones.forEach((opcion, index) => {
        const boton = document.createElement('button');
        boton.className = 'opcion';
        boton.type = 'button';
        boton.textContent = `${String.fromCharCode(97 + index)}) ${opcion}`;
        boton.addEventListener('click', () => comprobarRespuesta(index));
        opcionesEl.appendChild(boton);
      });

      imagenPreguntaEl.src = pregunta.imagen || 'images/pan.png';
      imagenPreguntaEl.alt = pregunta.alt || 'Imagen de referencia para la pregunta';
      siguienteBtn.disabled = true;
    }

    function comprobarRespuesta(index) {
      if (respuestaSeleccionada) return;
      respuestaSeleccionada = true;
      const correcta = preguntas[indiceActual].correcta;

      Array.from(opcionesEl.children).forEach((botonOpcion, i) => {
        botonOpcion.disabled = true;
        if (i === correcta) {
          botonOpcion.classList.add('correcta');
        } else if (i === index) {
          botonOpcion.classList.add('incorrecta');
        }
      });

      if (index === correcta) {
        aciertos += 1;
        feedbackEl.textContent = '¡Correcto! Muy bien.';
      } else {
        feedbackEl.textContent = `No es correcto. La respuesta correcta era: ${String.fromCharCode(97 + correcta)}). ${preguntas[indiceActual].opciones[correcta]}`;
      }

      siguienteBtn.disabled = false;
    }

    function siguientePregunta() {
      indiceActual += 1;
      if (indiceActual < preguntas.length) {
        mostrarPregunta();
      } else {
        mostrarResultado();
      }
    }

    function mostrarResultado() {
      quizEl.style.display = 'none';
      resultadoEl.style.display = 'block';
      const porcentaje = Math.round((aciertos / preguntas.length) * 100);
      let mensaje = '';

      if (porcentaje === 100) {
        mensaje = '¡Fantástico! Has acertado todas las preguntas.';
      } else if (porcentaje >= 70) {
        mensaje = '¡Muy bien! Tienes buenos hábitos saludables.';
      } else {
        mensaje = '¡Sigue practicando! Puedes volver a intentarlo.';
      }

      mensajeResultadoEl.textContent = `Has acertado ${aciertos} de ${preguntas.length} preguntas (${porcentaje}%). ${mensaje}`;
      const imagenExistente = resultadoEl.querySelector('img');
      if (imagenExistente) {
        imagenExistente.remove();
      }
      const imagenResultado = document.createElement('img');
      imagenResultado.src = 'images/celebrando.jpg';
      imagenResultado.alt = 'Celebrando';
      imagenResultado.className = 'imagen';
      resultadoEl.appendChild(imagenResultado);
    }

    function reiniciarQuiz() {
      indiceActual = 0;
      aciertos = 0;
      quizEl.style.display = 'block';
      resultadoEl.style.display = 'none';
      mostrarPregunta();
    }

    siguienteBtn.addEventListener('click', siguientePregunta);
    reiniciarBtn.addEventListener('click', reiniciarQuiz);
    mostrarPregunta();
  </script>
  <script src="pwa-register.js"></script>
</body>
</html>
