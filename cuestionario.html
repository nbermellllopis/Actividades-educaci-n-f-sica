<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuestionario de músculos y huesos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7e7ff, #fff1d6);
      color: #2f3e46;
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .contenedor {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      width: min(90vw, 760px);
      padding: 24px;
    }

    .menu-inicial {
      display: inline-block;
      margin-bottom: 16px;
      background-color: #dbeafe;
      color: #1d4ed8;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.05rem;
      padding: 10px 18px;
      border-radius: 8px;
      min-width: 140px;
      text-align: center;
    }

    .menu-inicial:hover {
      background-color: #bfdbfe;
      text-decoration: none;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #1d4ed8;
    }

    .intro {
      text-align: center;
      font-size: 1.05rem;
      margin-bottom: 16px;
    }

    .imagen {
      display: block;
      margin: 0 auto 16px;
      max-width: 280px;
      width: 100%;
      border-radius: 12px;
    }

    .pregunta {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 14px;
      color: #000000;
    }

    .opciones {
      display: grid;
      gap: 10px;
    }

    .opcion {
      padding: 12px 14px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      background: #f8fafc;
      cursor: pointer;
      font-size: 1rem;
      text-align: left;
      color: #2563eb;
    }

    .opcion:hover {
      background: #e0f2fe;
      border-color: #60a5fa;
    }

    .opcion.correcta {
      background: #dcfce7;
      border-color: #22c55e;
    }

    .opcion.incorrecta {
      background: #fee2e2;
      border-color: #ef4444;
    }

    .feedback {
      margin-top: 14px;
      font-weight: bold;
      min-height: 24px;
    }

    .acciones {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .resultado {
      display: none;
      text-align: center;
    }

    .resultado h2 {
      color: #1d4ed8;
    }

    .resultado p {
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <main class="contenedor">
    <a class="menu-inicial" href="index.html">Menú inicial</a>
    <h1>Cuestionario: músculos y huesos</h1>
    <p class="intro">Responde a estas 15 preguntas y descubre cuánto sabes sobre tu cuerpo.</p>
    <img id="imagenPregunta" class="imagen" src="images/esqueleto.jpg" alt="Imagen de referencia para la pregunta">

    <section id="quiz">
      <div id="pregunta" class="pregunta"></div>
      <div id="opciones" class="opciones"></div>
      <div id="feedback" class="feedback"></div>
      <div class="acciones">
        <button id="siguiente" type="button">Siguiente</button>
      </div>
    </section>

    <section id="resultado" class="resultado">
      <h2>¡Fin del cuestionario!</h2>
      <p id="mensajeResultado"></p>
      <button id="reiniciar" type="button">Volver a empezar</button>
    </section>
  </main>

  <script>
        const preguntas = [
      {
        pregunta: '¿Cuál es la principal función del esqueleto?',
        opciones: ['Transportar oxígeno por el cuerpo', 'Sostener el cuerpo y proteger los órganos internos', 'Producir la digestión de los alimentos'],
        correcta: 1,
        imagen: 'images/esqueleto_huesos.png',
        alt: 'Esqueleto humano completo'
      },
      {
        pregunta: '¿Qué hueso protege principalmente el cerebro?',
        opciones: ['La mandíbula', 'El cráneo', 'La clavícula'],
        correcta: 1,
        imagen: 'images/cerebro.jpg',
        alt: 'Cráneo y cerebro'
      },
      {
        pregunta: '¿Qué músculo permite doblar el brazo al flexionar el codo?',
        opciones: ['Bíceps', 'Cuádriceps', 'Gemelo'],
        correcta: 0,
        imagen: 'images/musculos-frente.jpg',
        alt: 'Músculos del brazo'
      },
      {
        pregunta: '¿Qué hueso es el más largo del cuerpo humano?',
        opciones: ['Tibia', 'Húmero', 'Fémur'],
        correcta: 2,
        imagen: 'images/huesos.jpg',
        alt: 'Huesos de las piernas'
      },
      {
        pregunta: '¿Cuál de estos músculos se encuentra en la parte delantera del muslo?',
        opciones: ['Cuádriceps', 'Tríceps', 'Trapecio'],
        correcta: 0,
        imagen: 'images/musculos_delante.png',
        alt: 'Músculos delanteros del cuerpo'
      },
      {
        pregunta: '¿Qué articulación permite mover el brazo en muchas direcciones?',
        opciones: ['Rodilla', 'Hombro', 'Tobillo'],
        correcta: 1,
        imagen: 'images/musculos-cuerpo.svg',
        alt: 'Articulación del hombro'
      },
      {
        pregunta: '¿Qué función tienen los músculos en el cuerpo?',
        opciones: ['Fabricar sangre', 'Permitir el movimiento y mantener la postura', 'Almacenar el oxígeno'],
        correcta: 1,
        imagen: 'images/musculos-frente.jpg',
        alt: 'Sistema muscular humano'
      },
      {
        pregunta: '¿Cuál de estos huesos forma parte de la columna vertebral?',
        opciones: ['Vértebra', 'Costilla', 'Escápula'],
        correcta: 0,
        imagen: 'images/esqueleto_huesos.png',
        alt: 'Columna vertebral'
      },
      {
        pregunta: '¿Qué músculo está situado en la parte posterior del brazo?',
        opciones: ['Bíceps', 'Tríceps', 'Pectoral'],
        correcta: 1,
        imagen: 'images/musculos_detras.png',
        alt: 'Músculos posteriores del brazo'
      },
      {
        pregunta: '¿Qué huesos protegen principalmente el corazón y los pulmones?',
        opciones: ['Las costillas', 'Las clavículas', 'Las escápulas'],
        correcta: 0,
        imagen: 'images/esqueleto.jpg',
        alt: 'Caja torácica y costillas'
      },
      {
        pregunta: '¿Qué ocurre cuando un músculo se contrae?',
        opciones: ['Se acorta y genera fuerza', 'Se convierte en hueso', 'Deja de consumir energía'],
        correcta: 0,
        imagen: 'images/levantando-vaso.jpg',
        alt: 'Contracción muscular en el brazo'
      },
      {
        pregunta: '¿Qué hueso une el brazo con el hombro?',
        opciones: ['Radio', 'Húmero', 'Peroné'],
        correcta: 1,
        imagen: 'images/huesos.jpg',
        alt: 'Húmero en el brazo'
      },
      {
        pregunta: '¿Qué músculos trabajan principalmente cuando nos ponemos de puntillas?',
        opciones: ['Gemelos', 'Abdominales', 'Deltoides'],
        correcta: 0,
        imagen: 'images/musculos_detras.png',
        alt: 'Gemelos en la parte posterior de la pierna'
      },
      {
        pregunta: '¿Qué tipo de tejido une un músculo a un hueso?',
        opciones: ['Ligamento', 'Tendón', 'Cartílago'],
        correcta: 1,
        imagen: 'images/musculos-cuerpo.svg',
        alt: 'Unión entre músculo y hueso'
      },
      {
        pregunta: '¿Qué sistema del cuerpo forman conjuntamente los huesos, músculos y articulaciones?',
        opciones: ['Sistema digestivo', 'Aparato locomotor', 'Sistema nervioso'],
        correcta: 1,
        imagen: 'images/esqueleto_huesos.png',
        alt: 'Aparato locomotor humano'
      }
    ];

    const preguntaEl = document.getElementById('pregunta');
    const opcionesEl = document.getElementById('opciones');
    const feedbackEl = document.getElementById('feedback');
    const siguienteBtn = document.getElementById('siguiente');
    const quizEl = document.getElementById('quiz');
    const resultadoEl = document.getElementById('resultado');
    const mensajeResultadoEl = document.getElementById('mensajeResultado');
    const reiniciarBtn = document.getElementById('reiniciar');
    const imagenPreguntaEl = document.getElementById('imagenPregunta');

    let indiceActual = 0;
    let aciertos = 0;
    let respuestaSeleccionada = false;

    function mostrarPregunta() {
      feedbackEl.textContent = '';
      respuestaSeleccionada = false;
      opcionesEl.innerHTML = '';
      const pregunta = preguntas[indiceActual];
      preguntaEl.textContent = `${indiceActual + 1}. ${pregunta.pregunta}`;

      pregunta.opciones.forEach((opcion, index) => {
        const boton = document.createElement('button');
        boton.className = 'opcion';
        boton.type = 'button';
        boton.textContent = `${String.fromCharCode(97 + index)}) ${opcion}`;
        boton.addEventListener('click', () => comprobarRespuesta(index, boton));
        opcionesEl.appendChild(boton);
      });

      imagenPreguntaEl.src = pregunta.imagen || 'images/esqueleto.jpg';
      imagenPreguntaEl.alt = pregunta.alt || 'Imagen de referencia para la pregunta';
      siguienteBtn.disabled = true;
    }

    function comprobarRespuesta(index, boton) {
      if (respuestaSeleccionada) return;
      respuestaSeleccionada = true;
      const correcta = preguntas[indiceActual].correcta;

      Array.from(opcionesEl.children).forEach((botonOpcion, i) => {
        botonOpcion.disabled = true;
        if (i === correcta) {
          botonOpcion.classList.add('correcta');
        } else if (i === index) {
          botonOpcion.classList.add('incorrecta');
        }
      });

      if (index === correcta) {
        aciertos += 1;
        feedbackEl.textContent = '¡Correcto! Muy bien.';
      } else {
        feedbackEl.textContent = `No es correcto. La respuesta correcta era: ${String.fromCharCode(97 + correcta)}). ${preguntas[indiceActual].opciones[correcta]}`;
      }

      siguienteBtn.disabled = false;
    }

    function siguientePregunta() {
      indiceActual += 1;
      if (indiceActual < preguntas.length) {
        mostrarPregunta();
      } else {
        mostrarResultado();
      }
    }

    function mostrarResultado() {
      quizEl.style.display = 'none';
      resultadoEl.style.display = 'block';
      const porcentaje = Math.round((aciertos / preguntas.length) * 100);
      let mensaje = '';

      if (porcentaje === 100) {
        mensaje = '¡Fantástico! Has acertado todas las preguntas.';
      } else if (porcentaje >= 70) {
        mensaje = '¡Muy bien! Has aprendido mucho sobre músculos y huesos.';
      } else {
        mensaje = '¡Sigue practicando! Puedes volver a intentarlo.';
      }

      mensajeResultadoEl.textContent = `Has acertado ${aciertos} de ${preguntas.length} preguntas (${porcentaje}%). ${mensaje}`;
      const imagenExistente = resultadoEl.querySelector('img');
      if (imagenExistente) {
        imagenExistente.remove();
      }
      const imagenResultado = document.createElement('img');
      imagenResultado.src = 'images/celebrando.jpg';
      imagenResultado.alt = 'Celebrando';
      imagenResultado.className = 'imagen';
      resultadoEl.appendChild(imagenResultado);
    }

    function reiniciarQuiz() {
      indiceActual = 0;
      aciertos = 0;
      quizEl.style.display = 'block';
      resultadoEl.style.display = 'none';
      mostrarPregunta();
    }

    siguienteBtn.addEventListener('click', siguientePregunta);
    reiniciarBtn.addEventListener('click', reiniciarQuiz);
    mostrarPregunta();
  </script>
</body>
</html>
